apiVersion: apps/v1
kind: Deployment
metadata:
  name: detection-engine
  labels:
    app: detection-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: detection-engine
  template:
    metadata:
      labels:
        app: detection-engine
    spec:
      containers:
        - name: detection-engine
          image: ghcr.io/jackiecloudsec/detection-as-code/detection-engine:latest
          imagePullPolicy: Always
          env:
            - name: LOKI_URL
              valueFrom:
                configMapKeyRef:
                  name: detection-engine-config
                  key: LOKI_URL
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: detection-engine
spec:
  selector:
    app: detection-engine
  ports:
    - port: 80
      targetPort: 80
