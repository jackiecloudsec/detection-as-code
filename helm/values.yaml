# Default values for detection-engine.

replicaCount: 1

image:
  repository: ghcr.io/jackiecloudsec/detection-as-code/detection-engine
  tag: latest
  pullPolicy: IfNotPresent

# Required for private GHCR image; create with: kubectl create secret docker-registry ghcr-pull-secret ...
imagePullSecrets:
  - name: ghcr-pull-secret

loki:
  url: http://loki.monitoring.svc:3100

alertmanager:
  url: http://alertmanager.monitoring.svc:9093/api/v1/alerts

engine:
  pollInterval: 60
  lookbackMinutes: 5
  logLevel: INFO

# Slack webhook (optional — leave empty to disable)
slack:
  webhookUrl: ""

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

extraEnv: []
namespace: ""
