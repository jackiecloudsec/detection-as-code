apiVersion: v1
kind: ConfigMap
metadata:
  name: detection-engine-config
  labels:
    {{- include "detection-engine.labels" . | nindent 4 }}
data:
  LOKI_URL: {{ .Values.loki.url | quote }}
  ALERTMANAGER_URL: {{ .Values.alertmanager.url | quote }}
  POLL_INTERVAL: {{ .Values.engine.pollInterval | quote }}
  LOOKBACK_MINUTES: {{ .Values.engine.lookbackMinutes | quote }}
  LOG_LEVEL: {{ .Values.engine.logLevel | quote }}
  {{- if .Values.slack.webhookUrl }}
  SLACK_WEBHOOK_URL: {{ .Values.slack.webhookUrl | quote }}
  {{- end }}
