apiVersion: apps/v1
kind: Deployment
metadata:
  name: detection-engine
  labels:
    {{- include "detection-engine.labels" . | nindent 4 }}
    {{- include "detection-engine.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "detection-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "detection-engine.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: detection-engine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: LOKI_URL
              valueFrom:
                configMapKeyRef:
                  name: detection-engine-config
                  key: LOKI_URL
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # No ports: engine is a worker loop, no HTTP server
          # Uncomment and add port if you add a health/ready endpoint later:
          # ports:
          #   - name: http
          #     containerPort: 8080
          #     protocol: TCP
          # livenessProbe:
          #   httpGet:
          #     path: /ready
          #     port: 8080
          #   initialDelaySeconds: 10
          #   periodSeconds: 30
          # readinessProbe:
          #   httpGet:
          #     path: /ready
          #     port: 8080
          #   initialDelaySeconds: 5
          #   periodSeconds: 10
