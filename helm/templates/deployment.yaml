apiVersion: apps/v1
kind: Deployment
metadata:
  name: detection-engine
  labels:
    {{- include "detection-engine.labels" . | nindent 4 }}
    {{- include "detection-engine.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "detection-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "detection-engine.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: detection-engine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: LOKI_URL
              valueFrom:
                configMapKeyRef:
                  name: detection-engine-config
                  key: LOKI_URL
            - name: ALERTMANAGER_URL
              valueFrom:
                configMapKeyRef:
                  name: detection-engine-config
                  key: ALERTMANAGER_URL
            - name: POLL_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: detection-engine-config
                  key: POLL_INTERVAL
            - name: LOOKBACK_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: detection-engine-config
                  key: LOOKBACK_MINUTES
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: detection-engine-config
                  key: LOG_LEVEL
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
