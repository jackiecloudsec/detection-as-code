{% extends "base.html" %}
{% block title %}{% if is_new %}New Post{% else %}Edit: {{ post.title }}{% endif %}{% endblock %}

{% block content %}
<section class="section" style="max-width: 800px; margin: 2rem auto;">
    <h2 class="section-title">{% if is_new %}New Post{% else %}Edit Post{% endif %}</h2>
    <form method="post" action="{% if is_new %}/blog/new{% else %}/blog/{{ post.id }}/edit{% endif %}" class="form">
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-input" value="{{ post.title }}" required>

        <label class="form-label">Summary</label>
        <textarea name="summary" class="form-input form-textarea-sm" rows="3" required>{{ post.summary }}</textarea>

        <label class="form-label">Tags (comma-separated)</label>
        <input type="text" name="tags" class="form-input" value="{{ post.tags | join(', ') }}">

        <label class="form-label">Content (Markdown-ish)</label>
        <textarea name="content" class="form-input form-textarea" rows="25" required>{{ post.content }}</textarea>

        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="/blog/{{ post.id }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
